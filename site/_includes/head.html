<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Psychotherapy of Litchfield - Marriage and Family Therapy" }}</title>
    <meta name="description" content="{{ page.description | default: "Psychotherapy and Counseling in Litchfield, CT. Private outpatient psychotherapy group practice serving high-functioning adults, couples, families, and youth." }}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --cream-bg: #f5f0eb;
            --dark-teal: #2d4a47;
            --dark-charcoal: #2a2a2a;
            --text-dark: #333333;
            --text-muted: #7a7a7a;
            --border-color: #e0d8d0;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            color: var(--text-dark);
            background-color: var(--cream-bg);
        }

        h1, h2, h3, h4, h5 {
            font-family: 'Playfair Display', serif;
        }

        /* Header */
        .site-header {
            background-color: var(--cream-bg);
            padding: 20px 0 0;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .header-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .header-subtitle a {
            color: var(--text-dark);
            text-decoration: none;
        }

        .header-subtitle a:hover {
            text-decoration: underline;
        }

        .btn-portal {
            background-color: var(--dark-teal);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-portal:hover {
            background-color: #234038;
            color: white;
        }

        .btn-appointment {
            background-color: var(--dark-charcoal);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn-appointment:hover {
            background-color: #1a1a1a;
            color: white;
        }

        /* Navigation */
        .main-nav {
            border-bottom: 1px solid var(--border-color);
            padding: 15px 0;
            margin-top: 15px;
        }

        .main-nav .nav-link {
            color: var(--text-dark);
            font-size: 0.95rem;
            padding: 8px 20px;
            position: relative;
        }

        .main-nav .nav-link:hover,
        .main-nav .nav-link.active {
            color: var(--dark-teal);
        }

        .main-nav .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -16px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: var(--dark-teal);
        }

        /* Hero Section */
        .hero-section {
            position: relative;
            height: 500px;
            background-image: url('https://images.unsplash.com/photo-1586105251261-72a756497a11?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            text-align: center;
            color: white;
            max-width: 700px;
            padding: 0 20px;
        }

        .hero-quote {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        .hero-tagline {
            font-size: 1rem;
            margin-bottom: 30px;
            opacity: 0.95;
        }

        .hero-buttons .btn-portal-hero {
            background-color: white;
            color: var(--text-dark);
            border: none;
            padding: 14px 40px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin: 5px;
        }

        .hero-buttons .btn-portal-hero:hover {
            background-color: #f0f0f0;
        }

        .hero-buttons .btn-appointment-hero {
            background-color: var(--dark-charcoal);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin: 5px;
        }

        .hero-buttons .btn-appointment-hero:hover {
            background-color: #1a1a1a;
        }

        /* Features Section */
        .features-section {
            background-color: var(--cream-bg);
            padding: 60px 0;
        }

        .feature-item {
            text-align: center;
            padding: 20px;
        }

        .feature-icon {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .feature-text {
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        /* About Section */
        .about-section {
            background-color: var(--cream-bg);
            padding: 60px 0 80px;
        }

        .section-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            line-height: 1.3;
            margin-bottom: 50px;
        }

        .about-subtitle {
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        .about-text {
            color: var(--text-dark);
            line-height: 1.8;
            max-width: 800px;
            margin: 0 auto 40px;
        }

        /* Logo Section */
        .logo-section {
            padding: 60px 0;
            background-color: var(--cream-bg);
        }

        .practice-logo {
            width: 150px;
            height: 150px;
            border: 2px solid var(--dark-teal);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            background-color: white;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--dark-teal);
            text-align: center;
            line-height: 1.2;
        }

        .practice-name {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .practice-type {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .practice-type a {
            color: var(--text-muted);
            text-decoration: underline;
        }

        /* Services Section */
        .services-section {
            background-color: var(--dark-charcoal);
            padding: 60px 0;
            color: white;
        }

        .services-section .section-label {
            color: rgba(255, 255, 255, 0.7);
        }

        .service-tag {
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 8px 18px;
            border-radius: 4px;
            margin: 5px;
            font-size: 0.9rem;
            color: white;
            transition: all 0.2s;
        }

        .service-tag:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .services-grid {
            margin-top: 60px;
        }

        .services-column h5 {
            text-transform: uppercase;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        .services-column ul {
            list-style: none;
            padding: 0;
        }

        .services-column li {
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        /* Location Section */
        .location-section {
            background-color: var(--cream-bg);
            padding: 60px 0 80px;
        }

        .location-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            line-height: 1.4;
            margin-bottom: 50px;
        }

        .map-container {
            margin-bottom: 20px;
        }

        .map-container iframe {
            border-radius: 8px;
            border: none;
        }

        .office-info h5 {
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        .office-info p {
            margin-bottom: 5px;
            color: var(--text-dark);
        }

        .office-info a {
            color: var(--text-dark);
            text-decoration: underline;
        }

        /* CTA Section */
        .cta-section {
            background-color: var(--cream-bg);
            padding: 60px 0 80px;
        }

        .cta-section .btn-portal {
            padding: 16px 60px;
            font-size: 1rem;
        }

        .cta-section .btn-appointment {
            padding: 16px 60px;
            font-size: 1rem;
        }

        /* Footer */
        .site-footer {
            background-color: var(--dark-charcoal);
            color: white;
            padding: 50px 0 30px;
        }

        .footer-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .footer-contact a {
            color: white;
            text-decoration: underline;
        }

        .footer-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .footer-link {
            color: white;
            text-decoration: underline;
            font-size: 0.85rem;
        }

        .footer-small {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-heading {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .social-icon {
            font-size: 1.5rem;
            color: white;
        }

        .powered-by {
            text-align: center;
            padding-top: 30px;
            margin-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .powered-by span {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .powered-links {
            font-size: 0.85rem;
        }

        .powered-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: underline;
            margin: 0 10px;
        }

        .emergency-notice {
            text-align: center;
            padding: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            max-width: 900px;
            margin: 20px auto 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-buttons {
                display: none;
            }

            .hero-quote {
                font-size: 1.8rem;
            }

            .section-title {
                font-size: 1.8rem;
            }

            .location-title {
                font-size: 1.6rem;
            }

            .services-grid {
                text-align: center;
            }

            .services-column {
                margin-bottom: 40px;
            }
        }
    </style>
</head>
